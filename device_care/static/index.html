<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Device Care">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Device Care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8ed;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .header { text-align: center; padding: 12px 0 16px; }
    .logo {
      width: 52px; height: 52px; margin: 0 auto 10px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 26px; border: 1px solid #2a2a4a;
    }
    h1 { font-size: 1.35rem; font-weight: 600; }
    .sub { color: #6b6b80; font-size: 0.8rem; margin-top: 4px; }

    .live {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; background: #12121a; border-radius: 10px; margin-bottom: 12px;
      border: 1px solid #1e1e2e; font-size: 0.85rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    .dot.wait { background: #f59e0b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .stat-card {
      background: linear-gradient(145deg, #14141f, #0f0f18);
      border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px;
      text-align: center;
    }
    .stat-card.wide { grid-column: 1 / -1; text-align: left; }
    .stat-num { font-size: 1.75rem; font-weight: 700; color: #60a5fa; line-height: 1.1; }
    .stat-num.green { color: #22c55e; }
    .stat-num.amber { color: #f59e0b; }
    .stat-label { font-size: 0.7rem; color: #6b6b80; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .progress-wrap {
      background: #1a1a28; border-radius: 8px; height: 8px; margin-top: 10px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, #3b82f6, #22c55e);
      border-radius: 8px; transition: width 0.3s ease; width: 0%;
    }
    .scan-detail { font-size: 0.8rem; color: #9ca3af; margin-top: 8px; }
    .scan-detail strong { color: #e8e8ed; }

    .phase-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    }
    .phase-badge.scanning { background: #1e3a5f; color: #60a5fa; }
    .phase-badge.waiting { background: #3d2e0a; color: #fbbf24; }
    .phase-badge.fetching { background: #1a2e1a; color: #4ade80; }

    .install {
      background: #12121a; border: 1px dashed #2a2a4a; border-radius: 10px;
      padding: 12px; font-size: 0.78rem; color: #8b8ba0; margin-bottom: 12px; line-height: 1.5;
    }
    .install b { color: #c4c4d4; }

    .alerts { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 1px solid #2a2a4a; border-radius: 14px; padding: 16px;
      animation: slideIn 0.35s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .card .sym { font-size: 1.2rem; font-weight: 700; }
    .card .dir { font-size: 0.85rem; margin: 6px 0; }
    .card .dir.up { color: #22c55e; }
    .card .dir.down { color: #ef4444; }
    .card .meta { font-size: 0.75rem; color: #6b6b80; }
    .empty {
      text-align: center; color: #4a4a5a; padding: 24px 16px; font-size: 0.85rem;
      background: #0f0f16; border-radius: 12px; border: 1px dashed #1e1e2e;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }
    .err { color: #f87171; font-size: 0.75rem; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚙️</div>
    <h1>Device Care</h1>
    <p class="sub">Background monitoring active</p>
  </div>

  <div class="live" id="liveBar">
    <span class="dot" id="liveDot"></span>
    <span id="liveText">Connecting...</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="totalCoins">—</div>
      <div class="stat-label">Coins scan</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="alertsTotal">0</div>
      <div class="stat-label">Alerts aaj</div>
    </div>
    <div class="stat-card wide">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="stat-label" style="margin:0">Scan progress</span>
        <span class="phase-badge waiting" id="phaseBadge">—</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="scan-detail" id="scanDetail">Loading status...</div>
    </div>
    <div class="stat-card">
      <div class="stat-num amber" id="lastDuration">—</div>
      <div class="stat-label">Last scan (sec)</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="nextScan">—</div>
      <div class="stat-label">Next scan (sec)</div>
    </div>
  </div>

  <div class="install">
    <b>App install:</b> Chrome menu (⋮) → <b>Add to Home screen</b> → Add
  </div>

  <div class="alerts" id="alerts"></div>
  <div class="empty" id="empty">
    <div class="empty-icon">📡</div>
    Abhi koi breakout nahi — scan chal rahi hai<br>
    <span style="font-size:0.75rem;color:#3a3a4a">Alert aane par yahan + alarm bajay ga</span>
  </div>

  <script>
    const BASE = location.pathname.startsWith('/device-care') ? '/device-care' : '';
    const alertsEl = document.getElementById('alerts');
    const emptyEl = document.getElementById('empty');

    function fmtTime(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return '—'; }
    }

    function updateStats(s) {
      document.getElementById('totalCoins').textContent = s.totalCoins ?? '—';
      document.getElementById('alertsTotal').textContent = s.alertsTotal ?? 0;
      document.getElementById('lastDuration').textContent =
        s.lastDurationSec != null ? s.lastDurationSec : '—';
      document.getElementById('nextScan').textContent =
        s.nextScanInSec != null ? s.nextScanInSec : '—';

      const pct = s.totalCoins > 0 ? Math.round((s.scanned / s.totalCoins) * 100) : 0;
      document.getElementById('progressBar').style.width = s.phase === 'scanning' ? pct + '%' : (s.phase === 'waiting' ? '100%' : '0%');

      const badge = document.getElementById('phaseBadge');
      const dot = document.getElementById('liveDot');
      const liveText = document.getElementById('liveText');

      if (s.phase === 'scanning') {
        badge.textContent = 'Scanning';
        badge.className = 'phase-badge scanning';
        dot.className = 'dot';
        liveText.textContent = `Live — ${s.scanned}/${s.totalCoins} coins`;
      } else if (s.phase === 'fetching_pairs') {
        badge.textContent = 'Loading';
        badge.className = 'phase-badge fetching';
        dot.className = 'dot wait';
        liveText.textContent = 'Pairs load ho rahi hain...';
      } else {
        badge.textContent = 'Waiting';
        badge.className = 'phase-badge waiting';
        dot.className = 'dot wait';
        liveText.textContent = `Live — ${s.totalCoins || '?'} coins monitor`;
      }

      let detail = '';
      if (s.phase === 'scanning' && s.currentCoin) {
        detail = `Ab scan: <strong>${s.currentCoin}</strong> (${s.scanned}/${s.totalCoins})`;
      } else if (s.lastScanAt) {
        detail = `Last scan: <strong>${fmtTime(s.lastScanAt)}</strong>`;
        if (s.lastDurationSec) detail += ` · ${s.lastDurationSec}s`;
        if (s.nextScanInSec != null) detail += ` · next ${s.nextScanInSec}s`;
      } else {
        detail = 'Pehli scan shuru ho rahi hai...';
      }
      document.getElementById('scanDetail').innerHTML = detail;
    }

    async function loadStatus() {
      try {
        const r = await fetch(BASE + '/api/status');
        const s = await r.json();
        updateStats(s);
      } catch (e) { console.warn(e); }
    }

    function addCard(a) {
      emptyEl.style.display = 'none';
      const c = document.createElement('div');
      c.className = 'card';
      const up = a.direction === 'UP';
      c.innerHTML = `
        <div class="sym">${a.symbol}</div>
        <div class="dir ${up ? 'up' : 'down'}">${up ? '▲ Breakout UP' : '▼ Breakout DOWN'}</div>
        <div class="meta">4H · ${a.close} · ${a.volume ? 'Vol ' + (a.volume / 1e6).toFixed(1) + 'M · ' : ''}${a.at ? new Date(a.at).toLocaleTimeString() : ''}</div>
      `;
      alertsEl.insertBefore(c, alertsEl.firstChild);
      while (alertsEl.children.length > 15) alertsEl.lastChild.remove();
    }

    function playAlarm() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const play = (t, f, d) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f; o.type = 'square';
          g.gain.setValueAtTime(0.35, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + d);
          o.start(t); o.stop(t + d);
        };
        const n = ctx.currentTime;
        for (let i = 0; i < 6; i++) play(n + i * 0.38, 880, 0.28);
      } catch (e) { console.warn(e); }
      if (navigator.vibrate) navigator.vibrate([400, 150, 400, 150, 400]);
    }

    async function notify(a) {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') await Notification.requestPermission();
      if (Notification.permission !== 'granted') return;
      const up = a.direction === 'UP';
      new Notification('Device Care', {
        body: `${a.symbol} ${up ? '▲ UP' : '▼ DOWN'} breakout`,
        icon: BASE + '/icon-192.svg',
        tag: 'dc-' + a.symbol,
        requireInteraction: true
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(BASE + '/sw.js', { scope: BASE + '/' }).catch(() => {});
    }
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    loadStatus();
    setInterval(loadStatus, 5000);

    const es = new EventSource(BASE + '/api/stream');
    es.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'stats') updateStats(msg.data);
        if (msg.type === 'alert') {
          addCard(msg.data);
          playAlarm();
          notify(msg.data);
        }
      } catch (e) { console.warn(e); }
    };
    es.onerror = () => {
      document.getElementById('liveText').textContent = 'Reconnecting...';
      document.getElementById('liveDot').className = 'dot wait';
    };
  </script>
</body>
</html>
