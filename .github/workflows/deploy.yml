name: Deploy PumpingBot

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_SERVICE_ID: c2f246da-a5ec-4432-ad4e-925438b85982
  VITE_API_URL: https://web-production-6a35f.up.railway.app

jobs:
  railway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.2.0

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret missing — add it in GitHub repo Settings → Secrets"
            exit 0
          fi
          railway up --service "$RAILWAY_SERVICE_ID" --detach -y

  vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: client
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret missing — skipping Vercel deploy"
            exit 0
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
        working-directory: client
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then exit 0; fi
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: client
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then exit 0; fi
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
