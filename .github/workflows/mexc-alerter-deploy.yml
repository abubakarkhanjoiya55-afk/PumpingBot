name: Deploy Device Care (MEXC Alerter)

on:
  push:
    branches: [main]
    paths:
      - "mexc-breakout-alerter/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mexc-breakout-alerter
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.2.0

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN missing"
            exit 0
          fi
          railway up --service device-care --detach 2>&1 || \
          railway up --service mexc-alerter --detach 2>&1 || \
          railway up --detach 2>&1
